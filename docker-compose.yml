services:
  panel:
    build: .
    container_name: dsdst-panel
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database — persisted via the volume below
      DB_PATH: /data/dsdst_panel.db
      # Required secrets — fill these in before running (or use a .env file)
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      PANEL_API_HASH_SECRET: ${PANEL_API_HASH_SECRET}
      # Optional
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Comma-separated allowed origins. Leave empty to allow all (tunnel / dev).
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    volumes:
      # SQLite database — never stored inside the container
      - panel_data:/data
      # Uploaded product images and expense attachments
      - panel_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  panel_data:
  panel_uploads:
